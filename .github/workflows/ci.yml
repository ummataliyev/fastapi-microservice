name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      DEBUG: "false"
      TRACING_ENABLED: "false"
      DOCS_ENABLED: "false"
      REDOC_ENABLED: "false"
      OPENAPI_ENABLED: "false"
      POSTGRES_DB: micro-service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      JWT_SECRET_KEY: ci-secret-key
      RATE_LIMIT_ENABLED: "false"
      RATE_LIMIT_RATE_LIMIT_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11.2"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check src

      - name: Unit tests
        run: uv run pytest -q src/tests/unit

      - name: Integration tests
        run: uv run pytest -q src/tests/integration

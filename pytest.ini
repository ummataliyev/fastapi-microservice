[pytest]
asyncio_mode = auto
python_files = test_*.py
python_functions = test_*
log_cli = false
log_level = WARNING
filterwarnings =
    ignore::pydantic.warnings.PydanticDeprecatedSince20
    ignore::DeprecationWarning
markers =
    integration: integration tests
    postgres: tests intended for PostgreSQL provider
    mysql: tests intended for MySQL provider
    mongo: tests intended for Mongo provider
